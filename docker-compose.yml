services:
  lampyrid:
    image: ghcr.io/radcod3/lampyrid:docker-support
    ports:
      - "3000:3000"
    environment:
      # MCP Server Configuration
      - MCP_TRANSPORT=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3000
      
      # Firefly III Configuration (set these values)
      - FIREFLY_BASE_URL=${FIREFLY_BASE_URL}
      - FIREFLY_TOKEN=${FIREFLY_TOKEN}
      
      # AuthKit Configuration (optional - for remote MCP server authentication)
      # Uncomment and set these values if you want to enable WorkOS AuthKit authentication
      # - AUTHKIT_DOMAIN=${AUTHKIT_DOMAIN}
      # - SERVER_BASE_URL=${SERVER_BASE_URL}
    restart: unless-stopped